<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Причесон</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <div class="logo">
                        <img src="лого/5422807179900686044.jpg" alt="Причесон" class="logo-image">
                        <div class="logo-text">
                            <h1>Причесон</h1>
                            <p class="logo-subtitle">Админ-панель</p>
                        </div>
                    </div>
                    <ul class="nav-menu" id="navMenu">
                        <li><a href="/" class="nav-link">Главная</a></li>
                        <li><a href="/services" class="nav-link">Услуги</a></li>
                        <li><a href="/reviews" class="nav-link">Отзывы</a></li>
                        <li><a href="/admin" class="nav-link">Админка</a></li>
                    </ul>
                    <div class="nav-actions">
                        <a href="tel:+79044104002" class="phone-link">+7 (904) 410-40-02</a>
                        <button class="menu-toggle" id="menuToggle">
                            <span></span><span></span><span></span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero hero-inner">
        <div class="hero-overlay"></div>
        <div class="container">
            <div class="hero-content">
                <h2 class="hero-title">Панель администратора</h2>
                <h1 class="hero-name">Управление записями и отзывами</h1>
            </div>
        </div>
    </section>

    <section class="services">
        <div class="container">
            <div class="contact-form-wrapper">
                <h3>Вход администратора</h3>
                <form id="adminLoginForm" class="contact-form">
                    <div class="form-group">
                        <input type="email" id="adminEmail" placeholder="Email администратора" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="adminPassword" placeholder="Пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <button type="button" id="adminLogoutBtn" class="btn btn-secondary">Выйти</button>
                </form>
                <p id="adminAuthStatus" class="prices-note">Не авторизован</p>
            </div>
        </div>
    </section>

    <section class="reviews">
        <div class="container">
            <h2 class="section-title">Записи клиентов</h2>
            <div id="appointmentsAdminList" class="reviews-grid">
                <article class="review-card"><p class="review-text">Выполните вход администратора.</p></article>
            </div>
        </div>
    </section>

    <section class="services">
        <div class="container">
            <h2 class="section-title">Отзывы клиентов</h2>
            <div id="reviewsAdminList" class="reviews-grid">
                <article class="review-card"><p class="review-text">Выполните вход администратора.</p></article>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        const API_BASE = "/api";
        const ADMIN_TOKEN_KEY = "token";
        const adminAuthStatus = document.getElementById("adminAuthStatus");
        const appointmentsContainer = document.getElementById("appointmentsAdminList");
        const reviewsContainer = document.getElementById("reviewsAdminList");
        const loginForm = document.getElementById("adminLoginForm");
        const logoutBtn = document.getElementById("adminLogoutBtn");

        function getToken() {
            return localStorage.getItem(ADMIN_TOKEN_KEY);
        }

        function setStatus(message) {
            adminAuthStatus.textContent = message;
        }

        async function apiRequest(url, options = {}) {
            const token = getToken();
            const headers = options.headers || {};
            if (token) {
                headers.Authorization = `Bearer ${token}`;
            }

            const response = await fetch(url, { ...options, headers });
            if (response.status === 204) {
                return null;
            }
            const data = await response.json();
            if (!response.ok) {
                const details = data.error ? ` ${data.error}` : "";
                throw new Error((data.message || "Ошибка API") + details);
            }
            return data;
        }

        function stars(rating) {
            const r = Math.max(1, Math.min(5, Number(rating) || 0));
            return `${"★".repeat(r)}${"☆".repeat(5 - r)}`;
        }

        async function loadAppointments() {
            const data = await apiRequest(`${API_BASE}/appointments/admin/all`);
            const items = data.appointments || [];
            if (!items.length) {
                appointmentsContainer.innerHTML = '<article class="review-card"><p class="review-text">Записей пока нет.</p></article>';
                return;
            }

            appointmentsContainer.innerHTML = items.map((item) => `
                <article class="review-card">
                    <div class="review-header">
                        <div class="review-avatar">${(item.user_name || "Г").charAt(0).toUpperCase()}</div>
                        <div>
                            <h3 class="review-name">${item.user_name || "Без имени"}</h3>
                            <p class="review-service">${item.service} | ${item.appointment_date} ${item.appointment_time}</p>
                        </div>
                    </div>
                    <p class="review-text">Телефон: ${item.user_phone || "не указан"}</p>
                    <p class="review-text">Комментарий: ${item.comment || "нет"}</p>
                    <p class="review-rating">Текущий статус: ${item.status}</p>
                    <div class="hero-buttons">
                        <button class="btn btn-primary" onclick="changeAppointmentStatus(${item.id}, 'confirmed')">Подтвердить</button>
                        <button class="btn btn-secondary" onclick="changeAppointmentStatus(${item.id}, 'cancelled')">Отменить</button>
                        <button class="btn btn-secondary" onclick="changeAppointmentStatus(${item.id}, 'new')">Сбросить в new</button>
                    </div>
                </article>
            `).join("");
        }

        async function loadReviews() {
            const data = await apiRequest(`${API_BASE}/reviews/admin/all`);
            const items = data.reviews || [];
            if (!items.length) {
                reviewsContainer.innerHTML = '<article class="review-card"><p class="review-text">Отзывов пока нет.</p></article>';
                return;
            }

            reviewsContainer.innerHTML = items.map((item) => `
                <article class="review-card">
                    <div class="review-header">
                        <div class="review-avatar">${(item.user_name || "Г").charAt(0).toUpperCase()}</div>
                        <div>
                            <h3 class="review-name">${item.user_name || "Без имени"}</h3>
                            <p class="review-service">${item.review_date}</p>
                        </div>
                    </div>
                    <p class="review-text">${item.text}</p>
                    <p class="review-rating">Оценка: ${stars(item.rating)} | Статус: ${item.moderation_status}</p>
                    <div class="hero-buttons">
                        <button class="btn btn-primary" onclick="changeReviewStatus(${item.id}, 'approved')">Одобрить</button>
                        <button class="btn btn-secondary" onclick="changeReviewStatus(${item.id}, 'rejected')">Отклонить</button>
                        <button class="btn btn-secondary" onclick="removeReview(${item.id})">Удалить</button>
                    </div>
                </article>
            `).join("");
        }

        async function refreshAdminData() {
            const token = getToken();
            if (!token) {
                setStatus("Не авторизован");
                return;
            }

            try {
                await apiRequest(`${API_BASE}/auth/admin`);
                setStatus("Вы авторизованы как admin.");
                await Promise.all([loadAppointments(), loadReviews()]);
            } catch (error) {
                setStatus(`Ошибка авторизации: ${error.message}`);
            }
        }

        async function changeAppointmentStatus(id, status) {
            try {
                await apiRequest(`${API_BASE}/appointments/${id}/status`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status })
                });
                await loadAppointments();
            } catch (error) {
                alert(error.message);
            }
        }

        async function changeReviewStatus(id, moderationStatus) {
            try {
                await apiRequest(`${API_BASE}/reviews/${id}/moderation-status`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ moderationStatus })
                });
                await loadReviews();
            } catch (error) {
                alert(error.message);
            }
        }

        async function removeReview(id) {
            if (!confirm("Удалить отзыв?")) {
                return;
            }
            try {
                await apiRequest(`${API_BASE}/reviews/${id}`, { method: "DELETE" });
                await loadReviews();
            } catch (error) {
                alert(error.message);
            }
        }

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                const email = document.getElementById("adminEmail").value.trim();
                const password = document.getElementById("adminPassword").value;
                const data = await apiRequest(`${API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
                await refreshAdminData();
            } catch (error) {
                alert(error.message);
            }
        });

        logoutBtn.addEventListener("click", () => {
            localStorage.removeItem(ADMIN_TOKEN_KEY);
            appointmentsContainer.innerHTML = '<article class="review-card"><p class="review-text">Выполните вход администратора.</p></article>';
            reviewsContainer.innerHTML = '<article class="review-card"><p class="review-text">Выполните вход администратора.</p></article>';
            setStatus("Вы вышли из аккаунта.");
        });

        window.changeAppointmentStatus = changeAppointmentStatus;
        window.changeReviewStatus = changeReviewStatus;
        window.removeReview = removeReview;

        refreshAdminData();
    </script>
</body>
</html>
